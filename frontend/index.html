<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程技术问答全文本搜索引擎</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入图标或者自定义样式 -->
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .highlight { background-color: #fef08a; font-weight: bold; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <div id="app" class="px-4 py-8 max-w-5xl mx-auto">
        
        <!-- 头部/搜索栏 -->
        <header class="text-center mb-10 pt-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-6">EduSearch 课程问答检索</h1>
            <div class="max-w-3xl mx-auto relative flex items-center shadow-lg rounded-full bg-white overflow-hidden border border-gray-200 focus-within:ring-2 focus-within:ring-blue-400 transition-all">
                <input 
                    type="text" 
                    v-model="searchQuery" 
                    @keyup.enter="handleSearch"
                    placeholder="输入问题或关键词，例如：自然语言处理..." 
                    class="w-full py-4 pl-6 pr-4 outline-none text-lg text-gray-700 bg-transparent"
                >
                <button 
                    @click="handleSearch"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-8 transition-colors">
                    搜索
                </button>
            </div>
            
            <!-- 检索逻辑选项 -->
            <div class="mt-6 flex flex-wrap justify-center gap-6 text-sm text-gray-600">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" v-model="logicType" value="match" class="form-radio text-blue-600 h-4 w-4">
                    <span>相关度匹配 (Match)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" v-model="logicType" value="and" class="form-radio text-blue-600 h-4 w-4">
                    <span>包含所有 (AND)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" v-model="logicType" value="or" class="form-radio text-blue-600 h-4 w-4">
                    <span>包含任意 (OR)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" v-model="useCustomRanking" class="form-checkbox text-blue-600 h-4 w-4">
                    <span>启用综合排序算法 (质量分加权)</span>
                </label>
            </div>
        </header>

        <!-- 搜索结果区 -->
        <main v-if="hasSearched">
            <!-- 错误提示 -->
            <div v-if="searchError" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6">
                {{ searchError }}
            </div>

            <!-- 统计信息 -->
            <div class="text-sm text-gray-500 mb-6 border-b pb-2">
                找到约 {{ results.length }} 条结果，用时 {{ searchTime }} 秒
            </div>

            <!-- 结果列表 -->
            <div v-if="results.length > 0" class="space-y-8">
                <transition-group name="fade">
                    <article v-for="res in results" :key="res.id" class="bg-white p-6 rounded-lg shadow border border-gray-100 hover:shadow-md transition-shadow">
                        <!-- 来源与分类 -->
                        <div class="text-xs text-blue-500 font-semibold mb-2">
                            {{ res.course_name }} 
                            <span class="text-gray-400 mx-1">•</span> 
                            相关性得分: {{ res._score }}
                        </div>
                        
                        <!-- 提问标题 -->
                        <h3 class="text-xl font-medium text-blue-800 hover:underline cursor-pointer mb-2">
                            {{ res.question }}
                        </h3>
                        
                        <!-- 最佳回答预览 -->
                        <div class="text-gray-600 mt-2 text-sm leading-relaxed">
                            <span class="inline-block bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded mr-2" v-if="res.best_answer.quality >= 4">高质量回答</span>
                            <span class="inline-block bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded mr-2" v-else-if="res.best_answer.quality >= 2">普通回答</span>
                            <p class="inline whitespace-pre-line">{{ res.best_answer.content }}...</p>
                        </div>
                        
                        <!-- 其它回答折叠面板 (可选) -->
                        <div class="mt-4 pt-4 border-t border-gray-100 text-sm">
                            <button @click="res.showMore = !res.showMore" class="text-gray-500 hover:text-blue-600 focus:outline-none flex items-center">
                                <svg class="w-4 h-4 mr-1 transition-transform" :class="{'rotate-180': res.showMore}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                {{ res.showMore ? '收起其他回答' : `查看全部 ${res.answers.length} 个回答` }}
                            </button>
                            
                            <div v-if="res.showMore" class="mt-4 space-y-3 pl-4 border-l-2 border-gray-200">
                                <div v-for="(ans, idx) in res.answers" :key="idx" class="bg-gray-50 p-3 rounded">
                                    <div class="text-xs text-gray-500 mb-1">质量分评级: {{ ans.answer_quality }}</div>
                                    <div class="text-gray-700">{{ ans.answer }}</div>
                                </div>
                            </div>
                        </div>
                    </article>
                </transition-group>
            </div>
            
            <!-- 空状态 -->
            <div v-else class="text-center py-20">
                <svg class="mx-auto h-24 w-24 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h3 class="text-xl text-gray-600">抱歉，没有找到相关问答数据</h3>
                <p class="text-gray-400 mt-2">请尝试更换检索词或调整逻辑选项</p>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref } = Vue;

        // 后端 API 地址（按需修改）
        const API_BASE = 'http://localhost:5000';

        createApp({
            setup() {
                const searchQuery = ref('');
                const logicType = ref('match');
                const useCustomRanking = ref(true);
                const hasSearched = ref(false);
                const searchTime = ref('0.00');
                const results = ref([]);
                const searchError = ref('');

                const handleSearch = async () => {
                    const keyword = searchQuery.value.trim();
                    if (!keyword) return;

                    hasSearched.value = true;
                    searchError.value = '';
                    results.value = [];

                    try {
                        const response = await fetch(`${API_BASE}/api/search`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                keyword,
                                logic: logicType.value,
                                use_custom_ranking: useCustomRanking.value,
                            }),
                        });

                        if (!response.ok) {
                            const err = await response.json().catch(() => ({}));
                            throw new Error(err.error || `请求失败 (${response.status})`);
                        }

                        const data = await response.json();
                        results.value = data.hits || [];
                        searchTime.value = data.took || '0.00';
                    } catch (err) {
                        console.error('搜索请求失败', err);
                        searchError.value = err.message || '网络错误，请确认后端服务已启动';
                    }
                };

                return {
                    searchQuery,
                    logicType,
                    useCustomRanking,
                    hasSearched,
                    searchTime,
                    results,
                    searchError,
                    handleSearch
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
